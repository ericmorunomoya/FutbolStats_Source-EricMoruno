<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Stats Pro - 2025/2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
        }

        .modal {
            transition: opacity 0.3s ease;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }

        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .league-tab {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .league-tab:hover {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15);
        }
        .league-tab.active {
            background: linear-gradient(135deg, #22c55e20, #22c55e08);
            border-color: #22c55e;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.15);
        }
        .league-tab.active .league-name {
            color: #22c55e;
        }

        .team-card {
            transition: all 0.2s ease;
        }
        .team-card:hover {
            transform: scale(1.03);
            border-color: #22c55e50;
            background: rgba(30, 41, 59, 0.9);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .league-flag {
            font-size: 2rem;
        }
    </style>
</head>

<body class="bg-[#0f172a] text-white font-sans min-h-screen">
    <nav class="p-6 bg-[#1e293b]/80 sticky top-0 z-40 border-b border-white/10 glass flex justify-between items-center">
        <h1 class="text-3xl font-black text-green-400 tracking-tighter cursor-pointer" onclick="location.reload()">⚽
            FUTBOL<span class="text-white">STATS</span></h1>
        <div id="auth-section" class="flex gap-4">
            <div id="user-info" class="hidden flex items-center gap-4">
                <span id="username-display" class="font-bold text-green-400"></span>
                <button onclick="logout()"
                    class="text-sm bg-red-500/20 text-red-400 px-3 py-1 rounded-lg border border-red-500/50 hover:bg-red-500 hover:text-white transition">Salir</button>
            </div>
            <div id="guest-btns" class="flex gap-3">
                <button onclick="openAuth('login')"
                    class="px-4 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition">Entrar</button>
                <button onclick="openAuth('register')"
                    class="bg-green-500 text-black px-6 py-2 rounded-xl font-bold hover:bg-green-400 shadow-lg shadow-green-500/20 transition">Registrarse</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-12">
        <!-- HERO + SEARCH -->
        <section class="max-w-3xl mx-auto text-center mb-12">
            <h2 class="text-5xl font-black mb-4 leading-tight">Sigue a tu equipo en la <span
                    class="text-green-400">Temporada 25/26</span></h2>
            <p class="text-gray-400 mb-8">6 ligas · 116 equipos · Estadísticas en tiempo real</p>
            <div class="relative group">
                <input type="text" id="search-input" onkeyup="if(event.key==='Enter')searchMatches()"
                    placeholder="Busca un equipo (ej: Real Madrid, PSG, Bayern...)"
                    class="w-full p-6 bg-[#1e293b] border-2 border-white/5 rounded-3xl text-xl outline-none focus:border-green-400 focus:bg-[#2e3a4e] transition-all shadow-2xl">
                <button onclick="searchMatches()"
                    class="absolute right-3 top-3 bg-green-500 text-black px-8 py-3 rounded-2xl font-black hover:scale-105 active:scale-95 transition-all">BUSCAR</button>
            </div>
        </section>

        <!-- LEAGUE TABS -->
        <section class="mb-12">
            <h3 class="text-2xl font-black mb-6 text-center uppercase tracking-widest text-gray-500">Selecciona una Liga</h3>
            <div id="league-tabs" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
        </section>

        <!-- LEAGUE CONTENT (teams + matches) -->
        <section id="league-content" class="hidden fade-in">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h3 id="league-title" class="text-3xl font-black text-green-400"></h3>
                    <p id="league-country" class="text-gray-500 font-bold uppercase tracking-widest text-xs mt-1"></p>
                </div>
                <button onclick="hideLeagueContent()" class="bg-white/5 border border-white/10 px-6 py-2 rounded-xl font-bold hover:bg-white/10 transition text-sm">✕ Cerrar</button>
            </div>

            <!-- Teams Grid -->
            <h4 class="text-xl font-black mb-4 uppercase tracking-wider text-gray-400">Equipos</h4>
            <div id="teams-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 mb-12"></div>

            <!-- League Matches -->
            <h4 class="text-xl font-black mb-4 uppercase tracking-wider text-gray-400">Últimos Partidos</h4>
            <div id="league-matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <!-- SEARCH RESULTS (shown when searching) -->
        <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <!-- AUTH MODAL -->
    <div id="auth-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-[#1e293b] w-full max-w-md p-10 rounded-[2.5rem] border border-white/10 shadow-2xl relative">
            <button onclick="closeModal('auth-modal')"
                class="absolute top-6 right-6 text-gray-400 hover:text-white">✕</button>
            <h2 id="auth-title" class="text-3xl font-black mb-8 text-center text-green-400">Entrar</h2>

            <div id="auth-form" class="space-y-4">
                <input type="text" id="auth-user" placeholder="Usuario (solo para registro)"
                    class="w-full p-4 bg-[#0f172a] rounded-2xl outline-none focus:ring-2 focus:ring-green-400 transition hidden">
                <input type="email" id="auth-email" placeholder="Email"
                    class="w-full p-4 bg-[#0f172a] rounded-2xl outline-none focus:ring-2 focus:ring-green-400 transition">
                <input type="password" id="auth-pass" placeholder="Contraseña"
                    class="w-full p-4 bg-[#0f172a] rounded-2xl outline-none focus:ring-2 focus:ring-green-400 transition">
                <button id="auth-submit" onclick="handleAuthSubmit()"
                    class="w-full bg-green-500 text-black py-4 rounded-2xl font-black text-lg hover:bg-green-400 transition transform active:scale-95">CONTINUAR</button>
                <p id="auth-error" class="text-red-400 text-center text-sm font-bold"></p>

                <!-- AUTO-VERIFY SECTION -->
                <div id="verify-area"
                    class="hidden mt-6 p-6 bg-green-500/10 border border-green-500/30 rounded-3xl text-center">
                    <p class="text-green-400 font-black mb-4">¿CUENTA SIN VERIFICAR?</p>
                    <button onclick="autoVerify()"
                        class="w-full bg-green-500 text-black py-3 rounded-xl font-black hover:scale-105 transition animate-[bounce-subtle_2s_infinite]">VERIFICAR
                        AHORA ➔</button>
                    <p class="text-[0.6rem] text-white/40 mt-3 font-bold uppercase">Esto abrirá el enlace de activación
                        simulado</p>
                </div>
            </div>
        </div>
    </div>

    <!-- DETAILS MODAL -->
    <div id="details-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div
            class="bg-[#1e293b] w-full max-w-5xl max-h-[90vh] overflow-y-auto rounded-[3rem] border border-white/10 shadow-2xl relative">
            <button onclick="closeModal('details-modal')"
                class="fixed right-10 top-10 text-white bg-white/10 p-4 rounded-full hover:bg-white/20 z-50">✕</button>
            <div id="details-content" class="p-8 md:p-12"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let currentAuthMode = 'login';
        let lastAttemptedEmail = '';
        let selectedLeagueId = null;

        const LEAGUE_FLAGS = {
            'España': '🇪🇸', 'Inglaterra': '🏴󠁧󠁢󠁥󠁮󠁧󠁿', 'Italia': '🇮🇹',
            'Alemania': '🇩🇪', 'Portugal': '🇵🇹', 'Francia': '🇫🇷'
        };

        function init() {
            if (currentUser) {
                document.getElementById('guest-btns').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username-display').innerText = currentUser.username;
            }
            loadLeagues();
        }

        // ========== LEAGUES ==========
        async function loadLeagues() {
            const tabsContainer = document.getElementById('league-tabs');
            tabsContainer.innerHTML = '<div class="col-span-full text-center py-8"><div class="animate-spin border-4 border-green-500 border-t-transparent w-10 h-10 rounded-full mx-auto mb-3"></div><p class="text-gray-500 text-xs font-bold uppercase tracking-widest">Cargando ligas...</p></div>';

            try {
                const res = await fetch(`${API_URL}/leagues`);
                const leagues = await res.json();
                tabsContainer.innerHTML = '';

                leagues.forEach(league => {
                    const flag = LEAGUE_FLAGS[league.country] || '🏳️';
                    tabsContainer.innerHTML += `
                        <div id="league-tab-${league.id}" class="league-tab bg-[#1e293b]/60 p-5 rounded-2xl text-center" onclick="selectLeague(${league.id}, '${league.name}', '${league.country}')">
                            <span class="league-flag block mb-2">${flag}</span>
                            <p class="league-name font-black text-sm uppercase tracking-wider text-gray-300">${league.name}</p>
                            <p class="text-[0.6rem] text-gray-600 font-bold uppercase mt-1">${league.country}</p>
                        </div>
                    `;
                });
            } catch (e) {
                tabsContainer.innerHTML = '<p class="col-span-full text-center text-red-500 font-black py-8">ERROR: Backend offline</p>';
            }
        }

        async function selectLeague(id, name, country) {
            // Toggle active tab
            document.querySelectorAll('.league-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`league-tab-${id}`).classList.add('active');
            selectedLeagueId = id;

            // Show league content section
            const content = document.getElementById('league-content');
            content.classList.remove('hidden');
            document.getElementById('matches-grid').innerHTML = '';

            document.getElementById('league-title').innerText = `${LEAGUE_FLAGS[country] || ''} ${name}`;
            document.getElementById('league-country').innerText = country;

            // Load teams
            const teamsGrid = document.getElementById('teams-grid');
            teamsGrid.innerHTML = '<div class="col-span-full text-center py-4"><div class="animate-spin border-4 border-green-500 border-t-transparent w-8 h-8 rounded-full mx-auto"></div></div>';

            try {
                const res = await fetch(`${API_URL}/leagues/${id}/teams`);
                const teams = await res.json();
                teamsGrid.innerHTML = '';
                teams.forEach(team => {
                    teamsGrid.innerHTML += `
                        <div class="team-card bg-[#1e293b]/40 border border-white/5 p-4 rounded-2xl text-center cursor-pointer" onclick="searchByTeam('${team.name.replace(/'/g, "\\'")}')">
                            <p class="font-black text-sm">${team.name}</p>
                        </div>
                    `;
                });
            } catch (e) {
                teamsGrid.innerHTML = '<p class="col-span-full text-red-400 text-center font-bold">Error cargando equipos</p>';
            }

            // Load league matches
            const matchesGrid = document.getElementById('league-matches-grid');
            matchesGrid.innerHTML = '<div class="col-span-full text-center py-4"><div class="animate-spin border-4 border-green-500 border-t-transparent w-8 h-8 rounded-full mx-auto"></div></div>';

            try {
                const res = await fetch(`${API_URL}/matches?league_id=${id}`);
                const matches = await res.json();
                matchesGrid.innerHTML = '';
                if (matches.length === 0) {
                    matchesGrid.innerHTML = '<p class="col-span-full text-center text-gray-600 font-bold uppercase py-8">Sin partidos registrados</p>';
                    return;
                }
                matches.forEach(m => {
                    matchesGrid.innerHTML += buildMatchCard(m);
                });
            } catch (e) {
                matchesGrid.innerHTML = '<p class="col-span-full text-red-400 text-center font-bold">Error cargando partidos</p>';
            }
        }

        function hideLeagueContent() {
            document.getElementById('league-content').classList.add('hidden');
            document.querySelectorAll('.league-tab').forEach(t => t.classList.remove('active'));
            selectedLeagueId = null;
        }

        function searchByTeam(teamName) {
            document.getElementById('search-input').value = teamName;
            searchMatches();
        }

        // ========== AUTH ==========
        function openAuth(mode) {
            currentAuthMode = mode;
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-title').innerText = mode === 'login' ? 'Entrar' : 'Unirse';
            document.getElementById('auth-user').classList.toggle('hidden', mode === 'login');
            document.getElementById('auth-error').innerText = '';
            document.getElementById('verify-area').classList.add('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const username = document.getElementById('auth-user').value;
            const errorEl = document.getElementById('auth-error');
            const endpoint = currentAuthMode === 'login' ? '/auth/login' : '/auth/register';
            const body = currentAuthMode === 'login' ? { email, password } : { username, email, password };

            errorEl.innerText = 'Procesando...';
            lastAttemptedEmail = email;

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    if (currentAuthMode === 'login') {
                        localStorage.setItem('user', JSON.stringify(data.user));
                        localStorage.setItem('token', data.token);
                        location.reload();
                    } else {
                        errorEl.innerText = '';
                        document.getElementById('verify-area').classList.remove('hidden');
                        alert('¡Registro exitoso! Ahora pulsa el botón VERIFICAR AHORA para activar tu cuenta.');
                    }
                } else {
                    errorEl.innerText = data.error;
                    if (data.needsVerification) {
                        document.getElementById('verify-area').classList.remove('hidden');
                    }
                }
            } catch (e) { errorEl.innerText = 'Error de conexión'; }
        }

        async function autoVerify() {
            if (!lastAttemptedEmail) {
                alert('Introduce tu email primero.');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/get-token/${lastAttemptedEmail}`);
                const data = await res.json();
                if (data.token) {
                    window.open(`${API_URL}/auth/verify/${data.token}`, '_blank');
                    document.getElementById('auth-error').innerText = 'Cuenta verificada. Ya puedes entrar.';
                    document.getElementById('verify-area').classList.add('hidden');
                    openAuth('login');
                } else {
                    alert('No se encontró cuenta pendiente para este email.');
                }
            } catch (e) { alert('Error al recuperar token.'); }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // ========== MATCHES ==========
        function buildMatchCard(m) {
            return `
                <div onclick="showDetails(${m.id})" class="bg-[#1e293b]/50 p-8 rounded-[2.5rem] border border-white/5 hover:border-green-500/50 hover:bg-[#1e293b] transition-all cursor-pointer group shadow-xl">
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-green-500/10 text-green-400 px-4 py-1 rounded-full text-[0.6rem] font-black uppercase tracking-widest">${new Date(m.match_date).toLocaleDateString()}</span>
                        <span class="text-white/20 text-[0.6rem] font-black group-hover:text-green-400 transition uppercase">Reporte ➔</span>
                    </div>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black tracking-tight">${m.home_team}</span>
                            <span class="text-3xl font-black text-white/10 group-hover:text-white transition">${m.result.split('-')[0]}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black tracking-tight">${m.away_team}</span>
                            <span class="text-3xl font-black text-white/10 group-hover:text-white transition">${m.result.split('-')[1]}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        async function searchMatches() {
            const team = document.getElementById('search-input').value;
            if (!team) return;

            // Hide league content when searching
            hideLeagueContent();

            const grid = document.getElementById('matches-grid');
            grid.innerHTML = '<div class="col-span-full pt-20 flex flex-col items-center"><div class="animate-spin border-4 border-green-500 border-t-transparent w-12 h-12 rounded-full mb-4"></div><p class="text-gray-400 font-bold tracking-widest text-xs uppercase">Buscando partidos...</p></div>';

            try {
                const res = await fetch(`${API_URL}/matches?team=${team}`);
                const matches = await res.json();
                grid.innerHTML = '';
                if (matches.length === 0) {
                    grid.innerHTML = '<div class="col-span-full py-20 text-center"><p class="text-3xl font-black text-gray-700 uppercase">SIN RESULTADOS</p></div>';
                    return;
                }
                matches.forEach(m => {
                    grid.innerHTML += buildMatchCard(m);
                });
            } catch (e) { grid.innerHTML = '<p class="text-center py-20 text-red-500 font-black">BACKEND OFFLINE</p>'; }
        }

        async function showDetails(id) {
            if (!currentUser) { openAuth('login'); return; }
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('details-content');
            modal.classList.remove('hidden');
            content.innerHTML = '<div class="h-96 flex items-center justify-center"><p class="text-4xl font-black text-green-400 italic animate-pulse">CARGANDO...</p></div>';

            try {
                const res = await fetch(`${API_URL}/matches/${id}`);
                const data = await res.json();
                let statsHtml = '<div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-12">';
                data.stats.forEach(s => {
                    const isHome = s.team_id === data.home_team_id;
                    statsHtml += `
                        <div class="bg-[#0f172a] p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                            <h4 class="text-green-400 font-black mb-8 border-b border-white/5 pb-4 uppercase text-center tracking-widest">${isHome ? data.home_team : data.away_team}</h4>
                            <div class="space-y-6">
                                <div class="flex justify-between items-end"><span class="text-xs font-bold text-white/40 uppercase">Posesión</span><span class="font-black text-4xl">${s.possession}%</span></div>
                                <div class="w-full bg-white/5 h-3 rounded-full overflow-hidden"><div class="bg-green-500 h-full rounded-full transition-all duration-1000" style="width:${s.possession}%"></div></div>
                                <div class="flex justify-between items-center"><span class="text-xs font-bold text-white/40 uppercase">Remates</span><span class="font-black text-2xl">${s.shots}</span></div>
                                <div class="flex justify-between items-center"><span class="text-xs font-bold text-white/40 uppercase">Córners</span><span class="font-black text-2xl">${s.corners}</span></div>
                            </div>
                        </div>
                    `;
                });
                statsHtml += '</div>';

                let playersHtml = '<div class="mt-16"><h3 class="text-3xl font-black mb-8 italic tracking-tighter">MEJORES JUGADORES</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
                data.playerStats.forEach(p => {
                    playersHtml += `<div class="flex items-center justify-between bg-[#1e293b] p-5 rounded-2xl border border-white/5 hover:border-green-400/30 transition shadow-lg"><div class="flex items-center gap-4"><span class="bg-green-500 text-black w-12 h-12 flex items-center justify-center rounded-xl font-black text-xl">${p.rating}</span><div><p class="font-black text-lg">${p.player_name}</p><p class="text-[0.6rem] text-white/40 font-black uppercase">${p.team_name} • ${p.position}</p></div></div><div class="flex gap-4"><div class="text-right"><p class="text-[0.5rem] text-white/30 uppercase font-bold">G</p><p class="font-black text-xl">${p.goals}</p></div><div class="text-right"><p class="text-[0.5rem] text-white/30 uppercase font-bold">A</p><p class="font-black text-xl">${p.assists}</p></div></div></div>`;
                });
                playersHtml += '</div></div>';

                content.innerHTML = `
                    <div class="text-center mb-16"><span class="text-green-500 font-black uppercase tracking-[0.3em] text-[0.7rem] mb-6 block">Informe de Partido</span>
                    <div class="flex items-center justify-center gap-6 md:gap-12"><h3 class="text-3xl md:text-5xl font-black flex-1 text-right tracking-tighter">${data.home_team}</h3><div class="bg-white text-black text-5xl md:text-7xl px-8 py-5 rounded-[2rem] font-black shadow-2xl">${data.result}</div><h3 class="text-3xl md:text-5xl font-black flex-1 text-left tracking-tighter">${data.away_team}</h3></div>
                    <p class="mt-8 text-white/20 font-black uppercase tracking-widest text-xs">${new Date(data.match_date).toLocaleDateString()}</p></div>
                    ${statsHtml}${playersHtml}
                    <div class="mt-16 text-center"><button onclick="closeModal('details-modal')" class="bg-white/5 border border-white/10 px-10 py-4 rounded-2xl font-bold hover:bg-white/10 transition">Cerrar</button></div>
                `;
            } catch (e) { content.innerHTML = '<p class="text-center py-20 font-black text-red-500">ERROR AL CARGAR DATOS</p>'; }
        }

        init();
    </script>
</body>

</html>
