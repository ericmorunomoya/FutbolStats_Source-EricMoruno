version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: futbol-stats-db
    environment:
      POSTGRES_USER: futbol_user
      POSTGRES_PASSWORD: futbol_password
      POSTGRES_DB: futbol_stats
    volumes:
      - ./seed_futbol.sql:/docker-entrypoint-initdb.d/seed_futbol.sql
      - futbol-db-data:/var/lib/postgresql/data
    networks:
      - futbol-net

  backend:
    build: ./backend
    container_name: futbol-stats-backend
    environment:
      DATABASE_URL: postgresql://futbol_user:futbol_password@db:5432/futbol_stats
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - futbol-net

  frontend:
    image: nginx:alpine
    container_name: futbol-stats-frontend
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "5050:80"
    networks:
      - futbol-net

networks:
  futbol-net:
    driver: bridge

volumes:
  futbol-db-data:
